[build]
  command = "cd Frontend && npm install && npm run build"
  publish = "Frontend/build"

# WebSocket proxy (keep this for Socket.IO to work properly)
[[redirects]]
  from = "/socket.io/*"
  to = "http://129.213.90.84:8080/socket.io/:splat"
  status = 200
  force = true

# Catch all for React routing - serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
