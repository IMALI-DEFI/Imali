[build]
  base = "Frontend"
  command = "npm install && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  NODE_OPTIONS = "--openssl-legacy-provider"

# Proxy API requests to your backend
[[redirects]]
  from = "/api/*"
  to = "https://api.imali-defi.com/api/:splat"
  status = 200
  force = true

# Catch all for React routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
