# Frontend/netlify.toml
[build]
  base = "Frontend"  # ← THIS tells Netlify to go into the Frontend folder first
  command = "npm install && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  NODE_OPTIONS = "--openssl-legacy-provider"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
